<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemax Gallery — Coming Soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #03051a;
    --navy-mid: #03051a;
    --silver: #c8c0b0;
    --silver-light: #e8e0d0;
    --gold: #c9a84c;
    --gold-light: #e5d28a;
    --text-dim: #8a8070;
  }

  html, body {
    height: 100%;
    background: #03051a;
    color: var(--silver-light);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }



  /* Page layout */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  /* Logo */
  .logo-wrap {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1.2s ease 0.3s forwards;
  }

  .logo-wrap img {
    width: min(595px, 90vw);
    height: auto;
    display: block;
  }

  /* Form */
  .form-wrap {
    margin-top: 24px;
    width: 100%;
    max-width: 440px;
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }

  .form-label {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: block;
  }

  .input-row {
    display: flex;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
    transition: border-color 0.3s;
  }

  .input-row:focus-within {
    border-color: rgba(201,168,76,0.7);
    box-shadow: 0 0 20px rgba(201,168,76,0.08);
  }

  .email-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 18px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--silver-light);
  }

  .email-input::placeholder {
    color: var(--text-dim);
  }

  .submit-btn {
    background: linear-gradient(135deg, rgba(201,168,76,0.8), rgba(229,210,138,0.8));
    border: none;
    padding: 14px 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }

  .submit-btn:hover {
    background: linear-gradient(135deg, rgba(229,210,138,0.95), rgba(255,240,170,0.95));
    transform: none;
  }

  .submit-btn:active { opacity: 0.85; }

  /* Success message */
  .success {
    display: none;
    margin-top: 20px;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-light);
  }

  .success.show { display: block; animation: fadeIn 0.5s ease; }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 12px;
    font-size: 0.68rem;
    color: #c07070;
    letter-spacing: 0.1em;
  }
  .error-msg.show { display: block; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>

  <div class="form-wrap">
    <label class="form-label">Be the first to know</label>
    <form id="signup-form" action="https://formspree.io/f/xeepqzzp" method="POST" novalidate>
      <div class="input-row" style="margin-bottom: 10px;">
        <input
          class="email-input"
          type="text"
          name="name"
          placeholder="Your name"
          required
          autocomplete="name"
        >
      </div>
      <div class="input-row">
        <input
          class="email-input"
          type="email"
          name="email"
          placeholder="Your email address"
          required
          autocomplete="email"
        >
        <button class="submit-btn" type="submit">Notify Me</button>
      </div>
    </form>
    <p class="success" id="success-msg">✦ &nbsp;You're on the list. We'll be in touch.</p>
    <p class="error-msg" id="error-msg">Please enter a valid email address.</p>
  </div>

</main>


<script>
  // Form handling
  const form = document.getElementById('signup-form');
  const success = document.getElementById('success-msg');
  const errorMsg = document.getElementById('error-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('show');

    const name = form.querySelector('input[name="name"]').value.trim();
    const email = form.querySelector('input[type="email"]').value.trim();

    if (!name) {
      errorMsg.textContent = 'Please enter your name.';
      errorMsg.classList.add('show');
      return;
    }

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorMsg.textContent = 'Please enter a valid email address.';
      errorMsg.classList.add('show');
      return;
    }

    const btn = form.querySelector('.submit-btn');
    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ name, email })
      });

      if (res.ok) {
        form.style.display = 'none';
        success.classList.add('show');
      } else {
        throw new Error('Server error');
      }
    } catch {
      btn.textContent = 'Notify Me';
      btn.disabled = false;
      errorMsg.textContent = 'Something went wrong. Please try again.';
      errorMsg.classList.add('show');
    }
  });
</script>
